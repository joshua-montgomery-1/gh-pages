<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Blazor Pages</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <script type="text/javascript">
        (function (location) {
            if (!location.search) {
                return;
            }

            var params = {};
            location.search
                .slice(1)
                .split('&')
                .forEach(function (entry) {
                    var pieces = entry.split('=');
                    params[pieces[0]] = pieces.slice(1).join('=').replace(/~and~/g, '&');
                });

            if (params.p !== undefined) {
                window.history.replaceState(
                    null,
                    '',
                    location.pathname.slice(0, -1) + (params.p || '') + (params.q ? ('?' + params.q) : '') + location.hash);
            }
        }(window.location));
    </script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="boot-splash">
            <div class="boot-shell">
                <div class="boot-mark">MB</div>
                <div>
                    <p class="boot-label">Hello Blazor Pages</p>
                    <h1>Loading dashboard...</h1>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">x</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
