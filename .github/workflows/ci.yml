name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore gh-pages.slnx

      - name: Build
        run: dotnet build gh-pages.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test gh-pages.slnx --configuration Release --no-build
